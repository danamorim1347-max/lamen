<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Delivery - Painel Administrativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBVaLBuEHarAxQWxJhMLYg_D0UiSuulK-k",
        authDomain: "applamen.firebaseapp.com",
        projectId: "applamen",
        storageBucket: "applamen.firebasestorage.app",
        messagingSenderId: "555867502790",
        appId: "1:555867502790:web:8024006ff183910fc6bfc7"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      window.firebaseDb = db;
      window.firebaseModules = { firestore: { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, query, where } };
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; }
        .font-bebas { font-family: 'Bebas Neue', cursive; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4">
    <div id="tela-login" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-[40px] shadow-2xl">
        <h1 class="text-3xl font-bebas text-red-600 text-center mb-6">PAINEL ADMIN</h1>
        <input id="email" type="email" placeholder="Seu email" class="w-full p-4 bg-gray-100 rounded-2xl mb-3">
        <input id="senha" type="password" placeholder="Qualquer senha" class="w-full p-4 bg-gray-100 rounded-2xl mb-4">
        <button onclick="fazerLogin()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-black hover:bg-red-700">ENTRAR</button>
        <div id="erro-login" class="text-red-500 text-xs mt-3 text-center hidden"></div>
    </div>

    <div id="painel-principal" class="hidden max-w-6xl mx-auto">
        <div class="bg-white rounded-[30px] p-6 shadow-lg mb-6 flex justify-between items-center">
            <div><h1 class="text-2xl font-bebas text-red-600">MASTER DELIVERY PRO</h1><p class="text-xs text-gray-500">Painel de Controle</p></div>
            <div class="flex items-center gap-4">
                <span id="email-admin" class="text-sm text-gray-600"></span>
                <button onclick="fazerLogout()" class="bg-gray-200 px-4 py-2 rounded-xl text-xs font-black hover:bg-gray-300">SAIR</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white p-5 rounded-2xl shadow" id="card-pendentes"><div class="text-3xl font-black text-yellow-500">0</div><div class="text-xs">Pendentes</div></div>
            <div class="bg-white p-5 rounded-2xl shadow" id="card-ativos"><div class="text-3xl font-black text-green-500">0</div><div class="text-xs">Ativos</div></div>
            <div class="bg-white p-5 rounded-2xl shadow" id="card-expirados"><div class="text-3xl font-black text-red-500">0</div><div class="text-xs">Expirados</div></div>
            <div class="bg-white p-5 rounded-2xl shadow" id="card-bloqueados"><div class="text-3xl font-black text-gray-500">0</div><div class="text-xs">Bloqueados</div></div>
        </div>

        <div class="flex gap-2 mb-4 overflow-x-auto">
            <button onclick="mudarAba('pendentes')" id="aba-pendentes" class="px-6 py-3 bg-red-600 text-white rounded-xl text-sm font-black shadow">⏳ Pendentes</button>
            <button onclick="mudarAba('ativos')" id="aba-ativos" class="px-6 py-3 bg-white rounded-xl text-sm font-black shadow">✅ Ativos</button>
            <button onclick="mudarAba('expirados')" id="aba-expirados" class="px-6 py-3 bg-white rounded-xl text-sm font-black shadow">🔴 Expirados</button>
            <button onclick="mudarAba('bloqueados')" id="aba-bloqueados" class="px-6 py-3 bg-white rounded-xl text-sm font-black shadow">🔒 Bloqueados</button>
            <button onclick="mudarAba('todos')" id="aba-todos" class="px-6 py-3 bg-white rounded-xl text-sm font-black shadow">👥 Todos</button>
        </div>

        <div id="lista-clientes" class="bg-white rounded-[30px] p-6 shadow-lg"></div>
    </div>

    <script>
        const SUPER_ADMIN_EMAIL = "dan.amorim@gmail.com"; // 🔴 ALTERE PARA SEU EMAIL

        function getFirebaseRefs() {
            return { db: window.firebaseDb, firestore: window.firebaseModules.firestore };
        }

        function fazerLogin() {
            const email = document.getElementById('email').value;
            if (email !== SUPER_ADMIN_EMAIL) {
                document.getElementById('erro-login').textContent = "Acesso negado!";
                document.getElementById('erro-login').classList.remove('hidden');
                return;
            }
            document.getElementById('tela-login').classList.add('hidden');
            document.getElementById('painel-principal').classList.remove('hidden');
            document.getElementById('email-admin').innerText = email;
            carregarClientes();
        }

        function fazerLogout() {
            document.getElementById('tela-login').classList.remove('hidden');
            document.getElementById('painel-principal').classList.add('hidden');
        }

        async function carregarClientes() {
            const { db, firestore } = getFirebaseRefs();
            const snap = await firestore.getDocs(firestore.collection(db, "estabelecimentos"));
            window.clientes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            
            document.querySelector('#card-pendentes div:first-child').innerText = window.clientes.filter(c => c.status === 'pendente').length;
            document.querySelector('#card-ativos div:first-child').innerText = window.clientes.filter(c => c.status === 'ativo').length;
            document.querySelector('#card-expirados div:first-child').innerText = window.clientes.filter(c => c.status === 'expirado').length;
            document.querySelector('#card-bloqueados div:first-child').innerText = window.clientes.filter(c => c.status === 'bloqueado').length;
            
            mudarAba('pendentes');
        }

        function mudarAba(tipo) {
            document.querySelectorAll('[id^="aba-"]').forEach(btn => {
                btn.classList.remove('bg-red-600', 'text-white');
                btn.classList.add('bg-white');
            });
            document.getElementById(`aba-${tipo}`).classList.remove('bg-white');
            document.getElementById(`aba-${tipo}`).classList.add('bg-red-600', 'text-white');
            
            const filtrados = tipo === 'todos' ? window.clientes : window.clientes.filter(c => c.status === tipo);
            renderizarClientes(filtrados);
        }

        function renderizarClientes(clientes) {
            const container = document.getElementById('lista-clientes');
            if (!clientes.length) {
                container.innerHTML = '<div class="text-center py-10 text-gray-400">Nenhum cliente</div>';
                return;
            }

            let html = '';
            clientes.forEach(c => {
                html += `<div class="border-b py-4 flex justify-between items-start">
                    <div>
                        <div class="font-black">${c.nome}</div>
                        <div class="text-sm">${c.email}</div>
                        <div class="text-xs">WhatsApp: ${c.whatsapp}</div>
                        <div class="text-xs">Link: /${c.slug}</div>
                    </div>
                    <div class="flex gap-2">
                        ${c.status === 'pendente' ? `
                            <button onclick="aprovar('${c.id}')" class="bg-green-500 text-white px-4 py-2 rounded-xl text-xs font-black">✅ APROVAR</button>
                            <button onclick="recusar('${c.id}')" class="bg-red-500 text-white px-4 py-2 rounded-xl text-xs font-black">❌ RECUSAR</button>
                        ` : ''}
                        ${c.status === 'ativo' ? `
                            <button onclick="renovar('${c.id}')" class="bg-blue-500 text-white px-3 py-2 rounded-xl text-xs font-black">🔄 RENOVAR</button>
                            <button onclick="bloquear('${c.id}')" class="bg-gray-500 text-white px-3 py-2 rounded-xl text-xs font-black">🔒 BLOQUEAR</button>
                        ` : ''}
                        ${c.status === 'expirado' ? `
                            <button onclick="renovar('${c.id}')" class="bg-green-500 text-white px-3 py-2 rounded-xl text-xs font-black">🔄 RENOVAR</button>
                            <button onclick="bloquear('${c.id}')" class="bg-gray-500 text-white px-3 py-2 rounded-xl text-xs font-black">🔒 BLOQUEAR</button>
                        ` : ''}
                        ${c.status === 'bloqueado' ? `
                            <button onclick="desbloquear('${c.id}')" class="bg-green-500 text-white px-3 py-2 rounded-xl text-xs font-black">🔓 DESBLOQUEAR</button>
                        ` : ''}
                        <button onclick="ver('${c.slug}')" class="bg-purple-500 text-white px-3 py-2 rounded-xl text-xs font-black">👁️ VER</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        async function aprovar(id) {
            const { db, firestore } = getFirebaseRefs();
            await firestore.updateDoc(firestore.doc(db, "estabelecimentos", id), {
                status: "ativo",
                data_aprovacao: new Date().getTime(),
                data_vencimento: new Date().getTime() + (30 * 24 * 60 * 60 * 1000)
            });
            Swal.fire('Aprovado!', '30 dias de acesso', 'success');
            carregarClientes();
        }

        async function renovar(id) {
            const { db, firestore } = getFirebaseRefs();
            await firestore.updateDoc(firestore.doc(db, "estabelecimentos", id), {
                status: "ativo",
                data_vencimento: new Date().getTime() + (30 * 24 * 60 * 60 * 1000)
            });
            Swal.fire('Renovado!', '+30 dias', 'success');
            carregarClientes();
        }

        async function bloquear(id) {
            if (!await Swal.fire({ title: 'Bloquear?', icon: 'warning', showCancelButton: true }).then(r => r.isConfirmed)) return;
            const { db, firestore } = getFirebaseRefs();
            await firestore.updateDoc(firestore.doc(db, "estabelecimentos", id), { status: "bloqueado" });
            carregarClientes();
        }

        async function desbloquear(id) {
            const { db, firestore } = getFirebaseRefs();
            await firestore.updateDoc(firestore.doc(db, "estabelecimentos", id), { status: "ativo" });
            Swal.fire('Desbloqueado!', '', 'success');
            carregarClientes();
        }

        async function recusar(id) {
            if (!await Swal.fire({ title: 'Recusar?', text: 'Esta ação não poderá ser desfeita', icon: 'warning', showCancelButton: true }).then(r => r.isConfirmed)) return;
            const { db, firestore } = getFirebaseRefs();
            await firestore.deleteDoc(firestore.doc(db, "estabelecimentos", id));
            carregarClientes();
        }

        function ver(slug) { if (slug) window.open(`/${slug}`, '_blank'); }

        window.fazerLogin = fazerLogin;
        window.fazerLogout = fazerLogout;
        window.mudarAba = mudarAba;
        window.aprovar = aprovar;
        window.renovar = renovar;
        window.bloquear = bloquear;
        window.desbloquear = desbloquear;
        window.recusar = recusar;
        window.ver = ver;
    </script>
</body>
</html>
