    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC5a-atJogQAIQL3DOgZxueXL66nBjbeiM",

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        /* Container principal - mais compacto para celular */
        .app-container {
            max-width: 100%;
            margin: 0 auto;
            padding: 0 12px;
        }
        
        /* Cards do cardápio - mais compactos */
        .product-card {
            background: white;
            border-radius: 20px;
            padding: 12px;
            transition: all 0.2s ease;
            cursor: pointer;
            box-shadow: 0 5px 15px -5px rgba(0,0,0,0.1);
            border: 1px solid rgba(139, 92, 246, 0.1);
            margin-bottom: 10px;
            display: flex;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }
        
        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(135deg, #8B5CF6, #6D28D9);
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .product-card:active {
            transform: scale(0.98);
        }
        
        .product-card:hover::before {
            opacity: 1;
        }
        
        .product-card img {
            width: 70px;
            height: 70px;
            border-radius: 16px;
            object-fit: cover;
            box-shadow: 0 3px 10px rgba(139, 92, 246, 0.2);
        }
        
        .product-info {
            flex: 1;
        }
        
        .product-info h4 {
            font-weight: 800;
            font-size: 1rem;
            color: #1f2937;
            margin-bottom: 2px;
        }
        
        .product-info p {
            font-size: 0.75rem;
            color: #6b7280;
            margin-bottom: 4px;
            line-height: 1.2;
        }
        
        .product-price {
            font-weight: 800;
            font-size: 1.1rem;
            color: #8B5CF6;
        }
        
        /* Categoria badge - mais compacto */
        .category-badge {
            background: linear-gradient(135deg, #8B5CF6, #6D28D9);
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.85rem;
            display: inline-block;
            margin: 15px 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(139, 92, 246, 0.3);
        }
        
        /* Header - mais compacto */
        .store-header {
            background: linear-gradient(135deg, #4C1D95, #6D28D9, #8B5CF6);
            padding: 20px 16px;
            border-radius: 0 0 30px 30px;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            margin-bottom: 5px;
        }
        
        .store-header::before {
            content: "🍜";
            position: absolute;
            font-size: 120px;
            opacity: 0.1;
            right: -20px;
            bottom: -30px;
            transform: rotate(15deg);
            pointer-events: none;
        }
        
        .store-header::after {
            content: "🥢";
            position: absolute;
            font-size: 100px;
            opacity: 0.1;
            left: -20px;
            top: -20px;
            transform: rotate(-15deg);
            pointer-events: none;
        }
        
        /* Botão flutuante do carrinho - mais compacto */
        .cart-fab {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #4C1D95, #6D28D9);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: 0 5px 20px rgba(76, 29, 149, 0.5);
            font-weight: 800;
            font-size: 0.9rem;
            display: flex;
            gap: 12px;
            align-items: center;
            z-index: 40;
            width: 90%;
            max-width: 350px;
            border: 2px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
        }
        
        .cart-badge {
            background: #FBBF24;
            color: #4C1D95;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 900;
            font-size: 0.85rem;
            margin-left: auto;
        }
        
        /* Botão admin */
        .admin-btn {
            background: white !important;
            color: #4C1D95 !important;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 5px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none !important;
            position: relative;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .admin-btn:hover {
            background: #f3f4f6 !important;
            transform: scale(1.05);
        }
        
        /* Location button - mais compacto */
        .location-btn {
            background: white !important;
            color: #4C1D95 !important;
            padding: 10px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.3);
            margin: 12px 0 5px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            width: 100%;
        }
        
        /* Categorias scroll - mais compacto */
        .categories-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 8px 0;
            margin-bottom: 5px;
            -webkit-overflow-scrolling: touch;
        }
        
        .categories-scroll::-webkit-scrollbar {
            display: none;
        }
        
        .category-pill {
            background: white;
            color: #4C1D95;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.8rem;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        /* Modal */
        .modal-overlay {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
        }
        
        .modal-content {
            background: white;
            border-radius: 25px;
            max-height: 85vh;
            overflow-y: auto;
        }
        
        /* Loading */
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Tamanhos e sabores */
        .size-option {
            background: #f3f4f6;
            padding: 10px;
            border-radius: 14px;
            text-align: center;
            font-weight: 700;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        
        .size-option.selected {
            background: #8B5CF6;
            color: white;
            transform: scale(1.02);
        }
        
        .flavor-tag {
            background: #f3f4f6;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        
        .flavor-tag.selected {
            background: #8B5CF6;
            color: white;
        }
        
        /* Toast */
        .toast-container {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 9999;
        }
        
        .toast {
            background: white;
            padding: 12px 20px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            border-left: 4px solid #10B981;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            font-size: 0.9rem;
        }
        
        /* GPS Result */
        .gps-result {
            background: linear-gradient(135deg, #10B981, #059669);
            color: white;
            padding: 12px;
            border-radius: 14px;
            margin: 10px 0;
            font-size: 0.85rem;
        }
        
        /* Inputs */
        .custom-input {
            width: 100%;
            padding: 12px 14px;
            background: #f5f3ff;
            border: 2px solid transparent;
            border-radius: 14px;
            font-size: 0.9rem;
            transition: all 0.3s;
            margin-bottom: 10px;
        }
        
        .custom-input:focus {
            outline: none;
            border-color: #8B5CF6;
            background: white;
        }
        
        /* No scrollbar */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        
        /* Desktop styles - mantém proporção */
        @media (min-width: 768px) {
            .app-container {
                max-width: 1200px;
                padding: 0 20px;
            }
            
            .desktop-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
            
            .product-card {
                margin-bottom: 0;
                padding: 16px;
            }
            
            .product-card img {
                width: 90px;
                height: 90px;
            }
            
            .product-info h4 {
                font-size: 1.1rem;
            }
            
            .store-header {
                padding: 25px 20px;
            }
            
            .cart-fab {
                max-width: 400px;
                padding: 15px 30px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body class="flex justify-center p-2 md:p-4">
    <!-- Loading -->
    <div id="loading" class="fixed inset-0 bg-gradient-to-br from-purple-900 to-purple-700 flex items-center justify-center z-[9999]">
        <div class="text-center text-white">
            <div class="text-5xl mb-3 animate-bounce">🍜</div>

        </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Audio -->

            <h2 class="text-xl font-black text-center">Acompanhar Pedido</h2>
        </div>
        
        <div class="p-4">
            <div id="tracking-status-box" class="p-6 rounded-3xl border-2 border-dashed mb-4 text-center bg-purple-50">

    <!-- Main Client View -->
    <div id="client-view" class="hidden w-full max-w-md md:max-w-4xl mx-auto">

        <div class="store-header">
            <div class="flex justify-between items-start relative z-10">
                <div>
                    <h1 id="store-name" class="text-2xl md:text-3xl font-black mb-1">LAMEN & CIA</h1>
                    <div class="flex items-center gap-2">

                    </div>
                </div>
                <!-- BOTÃO ADMIN -->
                <a href="./admin.html" class="admin-btn" target="_blank">
                    <i class="fas fa-lock text-xs"></i>
                    <span>Admin</span>
                </a>
            </div>
            
            <button onclick="locateStore()" class="location-btn">
                <i class="fas fa-map-marker-alt"></i>
                <span>📍 LOCALIZAR NOSSA LOJA</span>
            </button>
        </div>

        <!-- Categories -->
        <div class="mt-2 px-1">
            <div class="categories-scroll" id="categories-nav"></div>
        </div>

        <!-- Menu -->
        <div class="mt-1 px-1">
            <div id="menu-container" class="space-y-4"></div>
        </div>

        <!-- Cart FAB -->
        <div id="cart-fab" class="fixed left-0 right-0 bottom-3 px-3 hidden z-40">
            <button onclick="openCart()" class="cart-fab">
                <i class="fas fa-shopping-bag text-base"></i>
                <span class="flex-1 font-bold">Ver Carrinho</span>
                <span id="cart-total" class="cart-badge">R$ 0,00</span>
            </button>
        </div>

    <!-- Cart Modal -->
    <div id="cart-modal" class="hidden fixed inset-0 modal-overlay z-[100] flex items-end justify-center">
        <div class="bg-white w-full max-w-md rounded-t-2xl p-5 modal-content">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-xl font-black text-purple-600">Meu Carrinho</h3>
                <button onclick="closeCart()" class="text-xl text-gray-400">✕</button>
            </div>
            
            <div id="cart-items" class="space-y-2 max-h-80 overflow-y-auto"></div>
            
            <div id="cart-empty" class="text-center py-6 hidden">

                <p class="text-sm text-gray-500">Carrinho vazio</p>

            <div class="bg-purple-900 text-white p-4 rounded-xl mt-3">

    <!-- Product Details Modal -->
    <div id="product-modal" class="hidden fixed inset-0 modal-overlay z-[150] flex items-center justify-center p-3">

                <div id="size-area" class="hidden mb-3">

                <div id="flavor-area" class="hidden mb-3">

                </div>
                
                <div class="mb-3">
                    <div class="text-2xl font-black text-purple-600" id="product-price">R$ 0,00</div>

                <button onclick="addToCart()" id="add-to-cart-btn"

            </div>

    <!-- Checkout Modal -->

    <script>
        // ==================== GLOBAL VARIABLES ====================
        let cart = [];
        let menu = {};
        let config = {
            name: "LAMEN & CIA",
            whatsapp: "5511999999999",
            deliveryFee: 5.00,
            avgTime: 35,
            storeOpen: true,
            storeLat: -23.550520,
            storeLng: -46.633308,
            baseFee: 5.00,
            pricePerKm: 2.50
        };
        let consumptionMode = 'delivery';
        let selectedProduct = null;
        let selectedSize = null;
        let selectedFlavor = null;
        let gpsDistance = 0;
        let gpsFee = 0;
        let gpsCalculated = false;
        let userLat = null;
        let userLng = null;
        
        // ==================== CARDÁPIO PADRÃO ====================

        // ==================== LOCALIZAÇÃO ====================
        function locateStore() {
            if (config.storeLat && config.storeLng) {
                window.open(`https://www.google.com/maps/search/?api=1&query=${config.storeLat},${config.storeLng}`, '_blank');
                showToast('Abrindo mapa da loja...', 'info');
            } else {
                showNativeAlert('Loja ainda não configurou localização');
            }
        }
        
        function calculateDeliveryByGPS() {
            if (!navigator.geolocation) {
                showNativeAlert('Geolocalização não suportada');
                return;
            }
            
            if (!config.storeLat || !config.storeLng) {
                showNativeAlert('Loja sem localização configurada');
                return;
            }
            
            const btn = document.getElementById('gps-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Calculando...';
            btn.disabled = true;
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    userLat = position.coords.latitude;
                    userLng = position.coords.longitude;
                    
                    const distance = calculateDistance(
                        config.storeLat, config.storeLng,
                        userLat, userLng
                    );
                    
                    gpsDistance = distance;
                    gpsFee = config.baseFee + (distance * config.pricePerKm);
                    gpsCalculated = true;
                    
                    document.getElementById('gps-distance').textContent = `${distance.toFixed(1)} km`;
                    document.getElementById('gps-fee').textContent = `R$ ${gpsFee.toFixed(2)}`;
                    document.getElementById('gps-coords').innerHTML = `📍 ${userLat.toFixed(4)}, ${userLng.toFixed(4)}`;
                    document.getElementById('gps-result').classList.remove('hidden');
                    
                    updateCheckoutTotal();
                    
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    
                    showToast(`Distância: ${distance.toFixed(1)} km`);
                },
                (error) => {
                    showNativeAlert('Erro no GPS');
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }
        
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                     Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
                     Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return Math.round(R * c * 10) / 10;
        }

        window.initApp = async function() {
            console.log("🚀 Iniciando...");
            
            const params = new URLSearchParams(window.location.search);
            if (params.has('pedido')) {
                await loadTracking(params.get('pedido'));
                return;
            }
            
            await loadConfig();
            await loadMenu();
            
            setTimeout(() => {
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('client-view').classList.remove('hidden');
                }, 300);
            }, 800);
        };
        
        // ==================== LOAD DATA ====================

            try {
                const snapshot = await get(ref(window.db, 'config'));
                if (snapshot.exists()) {
                    config = { ...config, ...snapshot.val() };
                }
                
                document.getElementById('store-name').textContent = config.name;
                document.getElementById('store-status').innerHTML = config.storeOpen ? '● ABERTO' : '○ FECHADO';
                document.getElementById('store-status').className = `text-xs ${config.storeOpen ? 'bg-green-500' : 'bg-gray-500'} px-3 py-1 rounded-full font-bold`;
                document.getElementById('store-time').textContent = config.avgTime + ' min';
                
            } catch (error) {
                console.error("Erro ao carregar config:", error);
            }
        }
        
        async function loadMenu() {
            try {
                const snapshot = await get(ref(window.db, 'menu'));
                
                if (snapshot.exists()) {
                    menu = snapshot.val();
                } else {
                    menu = DEFAULT_MENU;
                    await set(ref(window.db, 'menu'), DEFAULT_MENU);
                }
                
                renderCategories();
                renderMenu();
                
            } catch (error) {
                console.error("Erro ao carregar menu:", error);
                menu = DEFAULT_MENU;
                renderCategories();
                renderMenu();
            }
        }

                html += `<button onclick="scrollToCategory('${cat}')" class="category-pill">${displayName}</button>`;

        function addToCart() {
            if (!selectedProduct) return;
            
            let item;
            
            if (selectedProduct.type === 'juice') {
                const price = selectedSize === '300ml' ? selectedProduct.price300 : selectedProduct.price500;
                item = {
                    id: Date.now(),
                    name: `${selectedProduct.name} (${selectedSize})`,
                    price: price,
                    image: selectedProduct.image
                };
            } else if (selectedProduct.type === 'soda') {
                const sizeNames = { 'lata': 'Lata', '1l': '1L', '2l': '2L' };
                const itemData = menu.refrigerantes[selectedSize];
                item = {
                    id: Date.now(),
                    name: `Refri ${sizeNames[selectedSize]} - ${selectedFlavor}`,
                    price: itemData.price,
                    image: itemData.image
                };
            } else {
                item = {
                    id: Date.now(),
                    name: selectedProduct.name,
                    price: selectedProduct.price,
                    image: selectedProduct.image
                };
            }
            
            cart.push(item);
            updateCartUI();
            closeProductModal();
            showToast('Item adicionado!');
        }
        
        // ==================== CART ====================
        function updateCartUI() {
            const total = cart.reduce((a, i) => a + i.price, 0);
            document.getElementById('cart-total').textContent = formatCurrency(total);
            document.getElementById('cart-total-modal').textContent = formatCurrency(total);
            
            if (cart.length > 0) {
                document.getElementById('cart-fab').classList.remove('hidden');
            } else {
                document.getElementById('cart-fab').classList.add('hidden');
            }
        }
        
        function openCart() {
            const container = document.getElementById('cart-items');
            if (cart.length === 0) {
                document.getElementById('cart-empty').classList.remove('hidden');
                container.innerHTML = '';
            } else {
                document.getElementById('cart-empty').classList.add('hidden');
                let html = '';
                cart.forEach((item, i) => {
                    html += `
                        <div class="bg-purple-50 p-3 rounded-xl flex items-center gap-2">
                            <img src="${item.image}" class="w-10 h-10 rounded-lg object-cover">
                            <div class="flex-1">
                                <div class="font-black text-xs">${item.name}</div>
                                <div class="text-purple-600 font-black text-xs">${formatCurrency(item.price)}</div>
                            </div>

                        </div>`;
                });
                container.innerHTML = html;
            }
            document.getElementById('cart-modal').classList.remove('hidden');
        }
        
        function closeCart() {
            document.getElementById('cart-modal').classList.add('hidden');
        }
        
        function removeFromCart(i) {
            cart.splice(i, 1);
            updateCartUI();
            openCart();
        }
        
        // ==================== CHECKOUT ====================
        function openCheckout() {
            if (cart.length === 0) return;
            closeCart();
            
            let html = '';
            let subtotal = 0;
            cart.forEach(item => {
                subtotal += item.price;
                html += `<div class="flex justify-between text-xs py-1 border-b border-purple-100">${item.name} <span class="font-black text-purple-600">${formatCurrency(item.price)}</span></div>`;
            });
            document.getElementById('checkout-items').innerHTML = html;
            
            setConsumptionMode(consumptionMode);
            document.getElementById('checkout-modal').classList.remove('hidden');
        }
        
        function closeCheckout() {
            document.getElementById('checkout-modal').classList.add('hidden');
            document.getElementById('gps-result').classList.add('hidden');
            gpsCalculated = false;
        }
        
        function setConsumptionMode(mode) {
            consumptionMode = mode;
            
            ['delivery', 'pickup', 'local'].forEach(m => {
                const btn = document.getElementById(`mode-${m}`);
                if (m === mode) {
                    btn.className = "p-2 text-xs font-black rounded-xl bg-purple-600 text-white";
                } else {
                    btn.className = "p-2 text-xs font-black rounded-xl bg-gray-200 text-gray-500";
                }
            });
            
            const addressArea = document.getElementById('address-area');
            const gpsSection = document.getElementById('gps-section');
            
            if (mode === 'delivery') {
                addressArea.style.display = 'block';
                gpsSection.style.display = 'block';
            } else {
                addressArea.style.display = 'none';
                gpsSection.style.display = 'none';
                gpsCalculated = false;
                document.getElementById('gps-result').classList.add('hidden');
            }
            
            updateCheckoutTotal();
        }
        
        function updateCheckoutTotal() {
            const subtotal = cart.reduce((a, i) => a + i.price, 0);
            let fee = 0;
            if (consumptionMode === 'delivery') {
                fee = gpsCalculated ? gpsFee : config.deliveryFee;
            }
            document.getElementById('checkout-total').textContent = formatCurrency(subtotal + fee);
        }
        
        document.getElementById('checkout-payment')?.addEventListener('change', function(e) {
            document.getElementById('change-area').style.display = e.target.value === 'cash' ? 'block' : 'none';
        });
        
        async function submitOrder() {
            const name = document.getElementById('checkout-name').value.trim();
            const phone = document.getElementById('checkout-phone').value.replace(/\D/g, '');
            
            if (!name) {
                showNativeAlert('Preencha seu nome!');
                return;
            }
            
            if (phone.length < 10) {
                showNativeAlert('WhatsApp inválido!');
                return;
            }
            
            if (consumptionMode === 'delivery') {
                if (!document.getElementById('checkout-street').value || !document.getElementById('checkout-neighborhood').value) {
                    showNativeAlert('Preencha o endereço completo!');
                    return;
                }
            }
            
            const subtotal = cart.reduce((a, i) => a + i.price, 0);
            const fee = consumptionMode === 'delivery' ? (gpsCalculated ? gpsFee : config.deliveryFee) : 0;
            const total = subtotal + fee;
            
            const items = {};
            cart.forEach(i => items[i.name] = (items[i.name] || 0) + 1);
            
            const order = {
                customer: name,
                phone,
                mode: consumptionMode,
                address: consumptionMode === 'delivery' ? {
                    street: document.getElementById('checkout-street').value,
                    number: document.getElementById('checkout-number').value,
                    neighborhood: document.getElementById('checkout-neighborhood').value,
                    complement: document.getElementById('checkout-complement').value
                } : null,
                items,
                subtotal,
                deliveryFee: fee,
                total,
                payment: document.getElementById('checkout-payment').value,
                change: document.getElementById('checkout-change').value || null,
                status: 'Novo',
                timestamp: Date.now(),
                gpsDistance: gpsCalculated ? gpsDistance : null,
                userLat: gpsCalculated ? userLat : null,
                userLng: gpsCalculated ? userLng : null
            };
            
            try {
                const newOrder = push(ref(window.db, 'orders'));
                await set(newOrder, order);
                
                localStorage.setItem('clientData', JSON.stringify({
                    name, phone,
                    street: document.getElementById('checkout-street').value,
                    number: document.getElementById('checkout-number').value,
                    neighborhood: document.getElementById('checkout-neighborhood').value
                }));
                
                const itemsText = Object.entries(items)
                    .map(([item, qty]) => `• ${qty}x ${item}`)
                    .join('\n');
                
                const modeText = {
                    'delivery': 'DELIVERY',
                    'pickup': 'RETIRADA',
                    'local': 'LOCAL'
                }[consumptionMode];
                
                const gpsText = gpsCalculated ? 
                    `\n📍 *Localização:* https://maps.google.com?q=${userLat},${userLng}\n` : '';
                
                const message = `*🍜 NOVO PEDIDO - ${config.name}*\n\n` +
                    `*Cliente:* ${name}\n` +
                    `*WhatsApp:* ${phone}\n` +
                    `*Modo:* ${modeText}\n` +
                    (consumptionMode === 'delivery' ? 
                        `*Endereço:* ${order.address.street}, ${order.address.number} - ${order.address.neighborhood}\n` : '') +
                    (gpsCalculated ? `*Distância:* ${gpsDistance.toFixed(1)} km\n` : '') +
                    gpsText +
                    `\n*ITENS:*\n${itemsText}\n\n` +
                    `*Subtotal:* ${formatCurrency(subtotal)}\n` +
                    (fee > 0 ? `*Taxa:* ${formatCurrency(fee)}\n` : '') +
                    `*TOTAL:* ${formatCurrency(total)}\n` +
                    `*Pagamento:* ${order.payment}\n` +
                    (order.change ? `*Troco:* R$ ${order.change}\n` : '') +
                    `\n🔄 *Acompanhe:* ${window.location.origin}${window.location.pathname}?pedido=${newOrder.key}`;
                
                window.open(`https://api.whatsapp.com/send?phone=${config.whatsapp}&text=${encodeURIComponent(message)}`, '_blank');
                
                cart = [];
                updateCartUI();
                
                window.location.href = `?pedido=${newOrder.key}`;
                
            } catch (error) {
                console.error("Erro ao enviar pedido:", error);
                showNativeAlert('Erro ao enviar pedido');
            }
        }
        
        // ==================== TRACKING ====================
        async function loadTracking(id) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('tracking-view').classList.remove('hidden');
            
            onValue(ref(window.db, `orders/${id}`), (snap) => {
                if (snap.exists()) {
                    const order = snap.val();
                    document.getElementById('tracking-status').textContent = order.status;
                    document.getElementById('tracking-time').textContent = 
                        order.status === 'Pronto' ? 'Pronto!' : 
                        order.status === 'Entregue' ? 'Entregue!' : 
                        `Tempo: ${config.avgTime} min`;
                }
            });
